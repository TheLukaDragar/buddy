# EAS Workflows — runs on Expo’s servers when triggered.
# Docs: https://docs.expo.dev/eas/workflows/get-started/
#
# 1) Link GitHub: Expo dashboard → Project → GitHub settings → install app → connect this repo.
# 2) Commit and push this file; workflows appear under Project → Workflows.
# 3) Adjust `branches` if your default branch is not `master`.
#
# On each push: native builds (production profile) + EAS Update to channel `production`
# (same channel as eas.json → build.production.channel). See:
# https://docs.expo.dev/eas/workflows/pre-packaged-jobs/#update

name: Production builds + OTA

on:
  push:
    branches:
      - master

jobs:
  build_android:
    name: Build Android (production)
    type: build
    params:
      platform: android
      profile: production

  build_ios:
    name: Build iOS (production)
    type: build
    params:
      platform: ios
      profile: production

  publish_update:
    name: Publish EAS Update (production channel)
    type: update
    environment: production
    params:
      channel: production
      platform: all
      # Head commit message on push & schedule only; manual `eas workflow:run` has no commit.
      message: "${{ github.commit_message || 'EAS Update' }}"
